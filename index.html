<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kt/Vシミュレーター</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

.input-group{
margin-bottom:15px;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
}

.slider{
width:100%;
}

.result{
margin-top:20px;
background:#eef3ff;
padding:20px;
border-radius:8px;
}

.good{
color:green;
font-weight:bold;
}

.bad{
color:red;
font-weight:bold;
}

canvas{
margin-top:30px;
}

.small{
font-size:12px;
color:#666;
}

</style>

</head>

<body>

<div class="container">

<h1>透析Kt/Vシミュレーター</h1>

<div class="input-group">
<label>体重 (kg)</label>
<input type="number" id="weight" value="60">
</div>

<div class="input-group">
<label>QB (mL/min)</label>
<input type="range" min="100" max="350" step="10" value="200" id="qb">
<div>QB: <span id="qb_value">200</span></div>
</div>

<div class="input-group">
<label>QD (mL/min)</label>
<input type="range" min="300" max="800" step="50" value="500" id="qd">
<div>QD: <span id="qd_value">500</span></div>
</div>

<div class="input-group">
<label>透析時間 (h)</label>
<input type="number" id="time" value="4">
</div>

<div class="input-group">
<label>UF量 (L)</label>
<input type="number" id="uf" value="2">
</div>

<div class="input-group">
<label>BUN前</label>
<input type="number" id="bun_pre" value="60">
</div>

<div class="input-group">
<label>BUN後</label>
<input type="number" id="bun_post" value="20">
</div>

<div class="result">

<p>理論Kt/V : <span id="ktv_pred">-</span></p>

<p>spKt/V : <span id="spktv">-</span></p>

<p>Kt/V評価 : <span id="evaluation">-</span></p>

</div>

<canvas id="ktvChart"></canvas>

<p class="small">
教育・研究用ツール
</p>

</div>

<script>

let chart;

function calculate(){

let weight=parseFloat(document.getElementById("weight").value);
let qb=parseFloat(document.getElementById("qb").value);
let qd=parseFloat(document.getElementById("qd").value);
let time=parseFloat(document.getElementById("time").value);
let uf=parseFloat(document.getElementById("uf").value);

let bun_pre=parseFloat(document.getElementById("bun_pre").value);
let bun_post=parseFloat(document.getElementById("bun_post").value);

let koa=900;

let V=0.6*weight;

let K=(qb*qd*koa)/((qb*qd)+(koa*(qb+qd)));

let ktv_pred=(K*time*60)/(V*1000);

let R=bun_post/bun_pre;

let spktv=-Math.log(R-0.008*time)+(4-3.5*R)*(uf/weight);

document.getElementById("ktv_pred").innerText=ktv_pred.toFixed(2);

document.getElementById("spktv").innerText=spktv.toFixed(2);

let eval_text;

if(spktv>=1.2){

eval_text="達成";

document.getElementById("evaluation").className="good";

}else{

eval_text="不足";

document.getElementById("evaluation").className="bad";

}

document.getElementById("evaluation").innerText=eval_text;

drawGraph(weight,qd,time);

}

function drawGraph(weight,qd,time){

let koa=900;

let qb_values=[];

let ktv_values=[];

let V=0.6*weight;

for(let qb=100; qb<=350; qb+=10){

let K=(qb*qd*koa)/((qb*qd)+(koa*(qb+qd)));

let ktv=(K*time*60)/(V*1000);

qb_values.push(qb);

ktv_values.push(ktv.toFixed(2));

}

if(chart){

chart.destroy();

}

let ctx=document.getElementById("ktvChart");

chart=new Chart(ctx,{

type:"line",

data:{

labels:qb_values,

datasets:[{

label:"QB vs Kt/V",

data:ktv_values,

borderWidth:2

}]

}

});

}

document.querySelectorAll("input").forEach(el=>{
el.addEventListener("input",calculate);
});

document.getElementById("qb").oninput=function(){
document.getElementById("qb_value").innerText=this.value;
calculate();
}

document.getElementById("qd").oninput=function(){
document.getElementById("qd_value").innerText=this.value;
calculate();
}

calculate();

</script>

</body>
</html>

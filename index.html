<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HDモード透析シミュレーター（修正版）</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; }
h1 { text-align: center; }
label { display: block; margin-top: 10px; }
input, select { padding: 5px; margin-top: 5px; width: 150px; }
.slider-label { display: flex; justify-content: space-between; width: 300px; }
.result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; background: #f9f9f9; }
.comment { margin-top: 10px; font-weight: bold; color: red; }
</style>
</head>
<body>
<h1>HDモード透析シミュレーター（修正版）</h1>

<label>性別:
<select id="gender">
  <option value="male">男性</option>
  <option value="female">女性</option>
</select>
</label>

<label>体重（kg）:<input type="number" id="weight" value="60"></label>

<label>透析時間（h）:<input type="number" id="time" value="4"></label>

<div class="slider-label">
  <label for="qb">血流量 QB (ml/min)</label>
  <span id="qbValue">200</span>
</div>
<input type="range" id="qb" min="100" max="400" value="200">

<div class="slider-label">
  <label for="qd">透析液流量 QD (ml/min)</label>
  <span id="qdValue">500</span>
</div>
<input type="range" id="qd" min="200" max="800" value="500">

<label>ダイアライザ:
<select id="dialyzer">
  <option value="FX-100">FX-100 (HD)</option>
  <option value="APS-15EA">APS-15EA (HD)</option>
  <option value="APS-18EA">APS-18EA (HD)</option>
  <option value="APS-21EA">APS-21EA (HD)</option>
  <option value="PES-21Sα">PES-21Sα (HD)</option>
  <option value="PES-25Sα">PES-25Sα (HD)</option>
  <option value="FB-110uβ">FB-110uβ (HD)</option>
  <option value="FB-150uβ">FB-150uβ (HD)</option>
  <option value="FB-210uβ">FB-210uβ (HD)</option>
  <option value="FB-250uβ">FB-250uβ (HD)</option>
  <option value="NF-1.6 H12">NF-1.6 H12 (HD)</option>
</select></label>

<label>実測 spKt/V:<input type="number" id="spktv" step="0.01" value="1.2"></label>

<div class="result" id="result"></div>

<canvas id="ktvChart" width="700" height="400"></canvas>

<script>
const dialyzers = {
  "FX-100": { KoA: 800, type:"高透析量" },
  "APS-15EA": { KoA: 700, type:"標準透析量" },
  "APS-18EA": { KoA: 900, type:"標準透析量" },
  "APS-21EA": { KoA: 1000, type:"高透析量" },
  "PES-21Sα": { KoA: 950, type:"高透析量" },
  "PES-25Sα": { KoA: 1100, type:"超高透析量" },
  "FB-110uβ": { KoA: 700, type:"標準透析量" },
  "FB-150uβ": { KoA: 850, type:"標準透析量" },
  "FB-210uβ": { KoA: 1050, type:"高透析量" },
  "FB-250uβ": { KoA: 1200, type:"超高透析量" },
  "NF-1.6 H12": { KoA: 950, type:"高透析量" }
};

// 折れ線グラフ初期化
const ctx = document.getElementById('ktvChart').getContext('2d');
const ktvChart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: '理論Kt/V',
      data: [],
      borderColor: 'blue',
      backgroundColor: 'rgba(0,123,255,0.1)',
      fill: true,
      tension: 0.3
    }]
  },
  options: {
    scales: { y: { beginAtZero: false }, x: { title: { display: true, text: '計算回数' } } }
  }
});

let count = 0;

function calculate() {
  const gender = document.getElementById("gender").value;
  const weight = parseFloat(document.getElementById("weight").value);
  const time = parseFloat(document.getElementById("time").value);
  const qb = parseFloat(document.getElementById("qb").value);
  const qd = parseFloat(document.getElementById("qd").value);
  const dialyzerName = document.getElementById("dialyzer").value;
  const spKtV = parseFloat(document.getElementById("spktv").value);

  document.getElementById("qbValue").innerText = qb;
  document.getElementById("qdValue").innerText = qd;

  const V = gender==="male"? 0.6*weight : 0.55*weight;
  const KoA = dialyzers[dialyzerName].KoA;

  const K = (qb * qd * KoA) / (qb*qd + KoA*(qb+qd));
  // 修正版：時間を分に変換
  const ktv = K * time * 60 / V / 1000;

  const diff = ktv - spKtV;

  document.getElementById("result").innerHTML = `
    <b>ダイアライザ:</b> ${dialyzerName} (${dialyzers[dialyzerName].type})<br>
    <b>理論Kt/V:</b> ${ktv.toFixed(2)}<br>
    <b>差分 (理論 - spKt/V):</b> ${diff.toFixed(2)}
  `;

  count++;
  ktvChart.data.labels.push(count);
  ktvChart.data.datasets[0].data.push(ktv.toFixed(2));
  ktvChart.update();
}

// リアルタイム計算
["qb","qd","gender","weight","time","dialyzer","spktv"].forEach(id=>{
  document.getElementById(id).addEventListener("input", calculate);
  document.getElementById(id).addEventListener("change", calculate);
});

// 初回計算
calculate();
</script>
</body>
</html>
